<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Digitization System{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #de5c8e;
      --gray-900: #2f3133;
      --gray-700: #58595b;
      --gray-100: #f4f5f7;
      --white: #ffffff;
      --line: #e2e4e8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 1024px;
      font-family: "Kanit", sans-serif;
      color: var(--gray-900);
      background: linear-gradient(180deg, #fff7fb 0%, #f7f8fb 65%);
    }

    .app-header {
      height: 92px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      background: #de5c8e;
      border-bottom: 1px solid #cf4f80;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .header-left {
      width: 250px;
      min-width: 250px;
    }

    .brand {
      color: #f8e1ea;
      font-weight: 400;
      line-height: 1.1;
      letter-spacing: 0.2px;
    }

    .brand-main {
      display: block;
      font-size: 20px;
    }

    .brand-sub {
      display: block;
      font-size: 12px;
      color: #f8e1ea;
      margin-top: 2px;
      font-weight: 400;
    }

    .header-center {
      flex: 1;
      text-align: center;
      color: #f8e1ea;
      font-weight: 400;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      padding: 6px 0;
      min-height: 100%;
      overflow: hidden;
    }

    .header-breadcrumb {
      font-size: 14px;
      color: #000;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0.85;
    }

    .header-title {
      font-size: 28px;
      color: #f8e1ea;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .crumb-segment {
      vertical-align: middle;
    }

    .crumb-segment.prev,
    .crumb-separator {
      color: #000;
    }

    .crumb-segment.current {
      color: #f8e1ea;
    }

    .crumb-separator {
      margin: 0 8px;
      opacity: 0.8;
    }

    .header-user {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      width: 250px;
      min-width: 250px;
      gap: 10px;
    }

    .user-name-box {
      background: var(--pink);
      color: var(--white);
      font-size: 16px;
      line-height: 1;
      padding: 10px 14px;
      border-radius: 999px;
      min-width: 128px;
      border: 1px solid #fff;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .logout-link {
      width: 42px;
      height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: var(--white);
      color: var(--pink);
      text-decoration: none;
      border: 1px solid #f0d2de;
      box-shadow: 0 3px 10px rgba(222, 92, 142, 0.18);
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .logout-link:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(222, 92, 142, 0.25);
    }

    .logout-icon {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    .layout {
      display: grid;
      grid-template-columns: 250px 1fr;
      min-height: calc(100vh - 72px);
    }

    .sidebar {
      background: #f8e1ea;
      color: var(--gray-900);
      padding: 20px 14px;
      border-right: 1px solid #efc8d8;
    }

    .menu-title {
      margin: 6px 10px 14px;
      font-size: 14px;
      letter-spacing: 0.7px;
      color: #9d5d79;
      opacity: 0.9;
    }

    .menu {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .menu a {
      color: #4b2f3b;
      text-decoration: none;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 400;
      opacity: 0.95;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .menu a.active,
    .menu a:hover {
      background: rgba(222, 92, 142, 0.16);
      opacity: 1;
    }

    .menu-icon {
      width: 18px;
      height: 18px;
      fill: #de5c8e;
      flex: 0 0 auto;
    }

    .content {
      padding: 26px;
    }

    .card {
      background: var(--white);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 20px;
    }

    .page-title {
      margin: 0 0 14px;
      color: var(--gray-900);
      font-size: 28px;
      font-weight: 500;
    }

    .btn {
      display: inline-block;
      background: #24a0ed;
      color: var(--white);
      text-decoration: none;
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-family: "Kanit", sans-serif;
      font-size: 15px;
      cursor: pointer;
      transition: filter 0.18s ease, transform 0.18s ease;
    }

    .btn:hover {
      filter: brightness(0.96);
    }

    .btn:active {
      transform: translateY(1px);
    }

    input,
    select {
      font-family: "Kanit", sans-serif;
      font-size: 15px;
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid #cfd4db;
      width: 100%;
    }

    /* Global rule: non-editable fields use the soft pink background. */
    input[readonly],
    input:disabled,
    select[readonly],
    select:disabled,
    textarea[readonly],
    textarea:disabled {
      background: #f8e1ea !important;
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 10px 10px;
    }

    th,
    td {
      border-bottom: 1px solid var(--line);
      text-align: left;
      padding: 10px 8px;
      font-size: 15px;
    }

    th {
      color: var(--gray-700);
      font-weight: 500;
    }

    .muted {
      color: #7a7e84;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .stack {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .save-btn-shared {
      background: #24a0ed;
      color: #fff;
    }

    .edit-btn-shared {
      background: #58595b;
      color: #fff;
    }

    .page-alert-placeholder {
      display: none;
    }

    .table-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 4px;
    }

    .table-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 44px;
      border-radius: 10px;
      background: #e9e9e9;
      padding: 0 12px;
      white-space: nowrap;
      transition: background-color 0.18s ease;
    }

    .table-bar.search-bar {
      flex: 1;
      min-width: 220px;
    }

    .table-bar.compact-bar {
      flex: 0 0 auto;
    }

    .table-bar.compact-bar.is-active,
    .table-bar.compact-bar:focus-within {
      background: #f8e1ea;
    }

    .table-input,
    .table-select {
      width: 100%;
      min-height: 44px;
      border: 0;
      border-radius: 10px;
      background: transparent;
      color: #000;
      font-size: 16px;
      padding: 0;
      font-family: "Kanit", sans-serif;
      appearance: none;
    }

    .table-select.compact-select {
      width: auto;
      min-width: 0;
      max-width: 100%;
      padding-right: 4px;
      flex: 0 0 auto;
    }

    .table-icon {
      width: 18px;
      height: 18px;
      fill: #5c5c5c;
      flex: 0 0 auto;
    }

    .table-input::placeholder {
      color: #000;
      opacity: 1;
    }

    .pattern-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 12px 10px;
      overflow: visible;
    }

    .pattern-table thead th {
      background: transparent;
      color: #58595b;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.2px;
      text-align: center;
      padding: 6px 10px;
      border: none !important;
      border-radius: 0;
      vertical-align: middle;
      box-shadow: none;
      outline: none;
    }

    .pattern-table thead th:not(:last-child) {
      border-right: none !important;
    }

    .pattern-table td {
      padding: 14px 10px;
      font-size: 16px;
      color: #000;
      border: 0;
      border-radius: 15px;
      text-align: center;
      vertical-align: middle;
      background: #f8e1ea;
    }

    .pattern-table tbody tr:nth-child(even) td {
      background: #e9e9e9;
    }

    .pattern-table tbody tr:nth-child(odd) td {
      background: #f8e1ea;
    }

    .pattern-table .left-cell {
      text-align: left;
    }
  </style>
</head>
<body>
  {% set page_title = self.title()|striptags|trim %}
  {% include "partials/header.html" %}
  <div class="layout">
    {% include "partials/sidebar.html" %}
    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>
  <script>
    (function () {
      var alertNode = document.querySelector('[data-page-alert-message]');
      if (!alertNode) {
        return;
      }
      var message = alertNode.getAttribute('data-page-alert-message');
      if (message) {
        window.setTimeout(function () {
          alert(message);
        }, 80);
      }
    })();
  </script>
</body>
</html>
