{% extends "base.html" %}

{% block title %}เอกสารทั้งหมด > เพิ่มเอกสาร{% endblock %}

{% block content %}
<section class="card">
  <style>
    .add-document-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 760px;
    }

    .add-document-label {
      font-size: 16px;
      color: #2f3133;
      margin-bottom: 6px;
    }

    .add-document-input,
    .add-document-select {
      min-height: 44px;
      border: 0;
      border-radius: 10px;
      background: #e9e9e9;
      padding: 10px 12px;
      font-size: 16px;
      font-family: "Kanit", sans-serif;
    }

    .owner-box {
      background: #de5c8e;
      color: #2f3133;
      font-weight: 500;
    }

    .field-help {
      margin: 6px 0 0;
      font-size: 13px;
      color: #6a6f75;
    }

    .inline-error {
      margin: 0 0 12px;
      color: #b00020;
      font-size: 15px;
    }
  </style>

  {% if message == 'created' %}
  <div class="page-alert-placeholder" data-page-alert-message="เพิ่มเอกสารเรียบร้อยแล้ว"></div>
  {% endif %}

  {% if error %}
  <div class="page-alert-placeholder" data-page-alert-message="{{ error }}"></div>
  <p class="inline-error">{{ error }}</p>
  {% endif %}

  <form method="post" action="{{ url_for('add_document_page') }}" class="add-document-form">
    <div>
      <label class="add-document-label">ผู้บันทึกรายการเอกสาร</label>
      <input class="add-document-input owner-box" value="{{ actor_name or '-' }}" readonly>
    </div>

    <div>
      <label class="add-document-label" for="file_name">รหัสเอกสาร (FileName)</label>
      <input class="add-document-input" id="file_name" name="file_name" required>
    </div>

    <div>
      <label class="add-document-label" for="bib">Bib# (Bibliographic Record)</label>
      <input class="add-document-input" id="bib" name="bib">
    </div>

    <div>
      <label class="add-document-label" for="call_number">เลขหนังสือ (CallNo)</label>
      <input class="add-document-input" id="call_number" name="call_number">
    </div>

    <div>
      <label class="add-document-label" for="collection">คอลเลกชัน (Collection)</label>
      <select class="add-document-select" id="collection" name="collection">
          <option value="">เลือก Collection</option>
          {% for option in collection_options %}
          <option value="{{ option }}">{{ option }}</option>
          {% endfor %}
      </select>
    </div>

    <div>
      <label class="add-document-label" for="title">ชื่อเรื่อง (Title)</label>
      <input class="add-document-input" id="title" name="title">
    </div>

    <div>
      <label class="add-document-label" for="publish_date">ปีที่พิมพ์ (Published Date)</label>
      <input class="add-document-input" id="publish_date" name="publish_date" type="number" placeholder="ใส่ปี พ.ศ.">
      <p class="field-help">เอกสารใหม่จะถูกตั้งสถานะเริ่มต้นเป็น "คัดเลือกเอกสาร" อัตโนมัติ</p>
    </div>

    <div style="margin-top: 8px;">
      <button class="btn save-btn-shared" type="submit">บันทึกข้อมูล</button>
    </div>
  </form>
</section>
{% endblock %}
